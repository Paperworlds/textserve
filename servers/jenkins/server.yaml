image: ghcr.io/lanbaoshen/mcp-jenkins:latest
protocol: http
runtime: docker
port: 9887
container_port: 9887
endpoint_path: /mcp
tags:
  - ci
  - docker
env:
  - name: JENKINS_URL
    value: "https://jenky.dev.pdgm.io"
  - name: JENKINS_USERNAME
    op: "op://Private/CI Dev Secrets/JENKINS_USER"
    cache: "jenkins/user"
  - name: JENKINS_TOKEN
    op: "op://Private/CI Dev Secrets/JENKINS_API_TOKEN"
    cache: "jenkins/token"
extra_args:
  - "--transport"
  - "streamable-http"
  - "--jenkins-url"
  - "${JENKINS_URL}"
  - "--jenkins-username"
  - "${JENKINS_USERNAME}"
  - "--jenkins-password"
  - "${JENKINS_TOKEN}"
health:
  endpoint: /health
  timeout: 5
# Node management and config-write ops rarely used
disabled_tools:
  - get_all_nodes
  - get_node
  - get_node_config
  - set_item_config
  - set_node_config
  - get_build_scripts
  - cancel_queue_item
