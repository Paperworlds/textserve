protocol: stdio
runtime: claude
native_cmd: npx
native_args:
  - "@sentry/mcp-server@latest"
env:
  - name: SENTRY_ACCESS_TOKEN
    # op path configured in ~/.config/paperworlds/textserve/local.yaml (not committed)
    cache: 1h
tags:
  - monitoring
  - stdio
health:
  probe: tool-list
  timeout: 5
# Project admin tools rarely needed day-to-day
disabled_tools:
  - create_dsn
  - create_project
  - create_team
  - update_project
  - get_event_attachment
  - get_profile_details
  - get_replay_details
