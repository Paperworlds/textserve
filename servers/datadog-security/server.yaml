transport: stdio
managed_by: claude
command: datadog-code-security-mcp
args: [start]
tags: [security, stdio]
deps:
  - cmd: "which datadog-code-security-mcp"
    hint: "Run: brew install datadog-labs/pack/datadog-code-security-mcp"
  - cmd: "which datadog-static-analyzer"
    hint: "Run: brew install datadog-static-analyzer"
env:
  - name: DD_SITE
    value: "datadoghq.com"
  # Required — server won't start without these. Get from Datadog account settings.
  # Note: auth is mandatory even for local scans. Unclear what data is sent to DD.
  - name: DD_API_KEY
    required: true
  - name: DD_APP_KEY
    required: true
health:
  probe: tool-list
  timeout: 10
