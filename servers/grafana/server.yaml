image: mcp/grafana
protocol: http
runtime: docker
port: 9891
container_port: 8000
endpoint_path: /mcp
tags:
  - monitoring
  - docker
env:
  - name: GRAFANA_URL
    value: "https://paradigmconnect.grafana.net"
  - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
    op: "op://Private/Grafana Paradigmconnect/GRAFANA_API_KEY"
    cache: "grafana/token"
extra_args:
  - "-transport"
  - "streamable-http"
  - "-address"
  - "0.0.0.0:8000"
health:
  endpoint: /health
  timeout: 5
