version: 1

prompts_dir: prompts/
state_dir: logs/
reports_dir: reports/

repos:
  mcp-fleet: .

shared_context:
  - .

defaults:
  model: sonnet
  budget_usd: 2.00
  max_turns: 100
  claude_cmd: claude-work
  terse: true

max_parallel: 1
total_budget_usd: 30.00
warn_at_pct: 80

hooks:
  on_fail: "osascript -e 'display notification \"Task $TASK_ID failed\" with title \"mcp-fleet\" subtitle \"FAIL\"'"
  on_done: "osascript -e 'display notification \"Task $TASK_ID done\" with title \"mcp-fleet\" subtitle \"$STATUS\"'"
  on_all_done: "osascript -e 'display notification \"All tasks complete\" with title \"mcp-fleet\"'"
