# Archived servers — not loaded by the CLI.
# Restore by moving entries back to registry.yaml.
servers:
  airbyte:
    image: "mcp-airbyte"
    protocol: http
    runtime: docker
    port: 9893
    container_port: 9000
    endpoint_path: /mcp
    tags: [data, docker]
    deps:
      - cmd: "kubectl get svc airbyte-helmv2-airbyte-server-svc -n airbyte-helmv2"
        hint: "Run: kubectl port-forward svc/airbyte-helmv2-airbyte-server-svc 18001:8001 -n airbyte-helmv2"
    health:
      endpoint: /health
      timeout: 10

  graph:
    protocol: stdio
    runtime: process
    tags: [native, knowledge, memory]
    deps: []
    health:
      probe: pid
      timeout: 5

  datadog-security:
    protocol: stdio
    runtime: claude
    tags: [security, stdio]
    deps: []
    auth:
      type: op
      item: "op://Private/Datadog API Keys"
    health:
      probe: tool-list
      timeout: 5
